{% extends "base.html" %}

{% block title %}Reset password{% endblock %}

{% block content %}
<h1>Reset password</h1>

<p>This is a demo reset form. Enter your username and a new password.</p>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="btn btn-accent" type="submit">Reset password</button>
</form>
{% endblock %}
