{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
    <h1>Login</h1>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="btn btn-dark" type="submit">Login</button>
        <a class="btn btn-light" style="padding: 8px" href="{% url 'simple_password_reset' %}">Forgot Password?</a>

    </form>
    <hr>
    <a class="btn btn-accent" href="{% url 'register' %}">Create New Profile</a>
{% endblock %}
